wireplumber.settings = {
  # follow the priority list below, not whatever device was last picked by hand
  node.restore-default-targets = false
  # when a sink drops, move players to the next device instead of pausing them
  linking.pause-playback = false
}

monitor.bluez.rules = [
  # OnePlus Buds 4
  { matches = [ { node.name = "~bluez_output.88_92_CC_E4_4F_D5" } ]
    actions = { update-props = { priority.session = 1300 } } }
  # BOOM 3
  { matches = [ { node.name = "~bluez_output.C0_28_8D_D9_2D_D1" } ]
    actions = { update-props = { priority.session = 1200 } } }
]

monitor.alsa.rules = [
  # Sound Blaster G6
  { matches = [ { node.name = "~alsa_output.usb-Creative.*analog-stereo" } ]
    actions = { update-props = { priority.session = 1100 } } }
  # BenQ (nvidia HDMI)
  { matches = [ { node.name = "~alsa_output.pci-0000_2d_00.1" } ]
    actions = { update-props = { priority.session = 1000 } } }
]

monitor.alsa.rules = [
  # onboard Realtek ALC1220, never used, disable the whole card
  { matches = [ { device.name = "alsa_card.pci-0000_2f_00.4" } ]
    actions = { update-props = { device.disabled = true } } }

  # pin to the BenQ's output, the other two monitors are speakerless Zowies
  { matches = [ { device.name = "alsa_card.pci-0000_2d_00.1" } ]
    actions = { update-props = { device.profile = "output:hdmi-stereo-extra2" } } }

  # Sound Blaster G6, keep output, drop its capture (mic) node
  { matches = [ { node.name = "alsa_input.usb-Creative_Technology_Ltd_Sound_BlasterX_G6_9A0066436CX-00.analog-stereo" } ]
    actions = { update-props = { node.disabled = true } } }

  # GoXLR Mini, keep ONLY the mic (Headset source), hide routing channels
  # EXPERIMENTAL: revert this block if the mic or goxlr-utility misbehave
  { matches = [
      { node.name = "alsa_output.usb-TC-Helicon_GoXLRMini-00.HiFi__Speaker__sink" }
      { node.name = "alsa_output.usb-TC-Helicon_GoXLRMini-00.HiFi__Headphones__sink" }
      { node.name = "alsa_output.usb-TC-Helicon_GoXLRMini-00.HiFi__Line1__sink" }
      { node.name = "alsa_output.usb-TC-Helicon_GoXLRMini-00.HiFi__Line2__sink" }
      { node.name = "alsa_output.usb-TC-Helicon_GoXLRMini-00.HiFi__Line3__sink" }
      { node.name = "alsa_input.usb-TC-Helicon_GoXLRMini-00.HiFi__Line4__source" }
      { node.name = "alsa_input.usb-TC-Helicon_GoXLRMini-00.HiFi__Line5__source" }
    ]
    actions = { update-props = { node.disabled = true } } }
]

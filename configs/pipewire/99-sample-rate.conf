# allow 44.1k alongside the 48k default so playback follows the source instead of always resampling
# resample.quality 14 is the max, highest quality resampler when a rate switch is unavoidable
context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 ]
    resample.quality            = 14
}
